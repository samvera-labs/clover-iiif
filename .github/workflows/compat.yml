name: Compatibility + E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  examples:
    name: React 18 and 19 Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.5.0
          cache: npm

      - name: Install root deps (allow peer mismatch)
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build

      - name: Copy web component UMD into examples
        run: |
          mkdir -p playwright/next-react19/public
          mkdir -p playwright/next-react18/public
          mkdir -p playwright/html
          cp dist/web-components/index.umd.js playwright/next-react19/public/wc.js
          cp dist/web-components/index.umd.js playwright/next-react18/public/wc.js
          cp dist/web-components/index.umd.js playwright/html/wc.js

      - name: Pack library
        id: pack
        shell: bash
        run: |
          # Capture only the tarball filename (last line), stripping any CRs
          PKG_TGZ=$(npm pack --silent | tail -n 1 | tr -d '\r')
          echo "PKG_TGZ=$PKG_TGZ" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: React 19 - install deps
        working-directory: playwright/next-react19
        run: |
          npm i --no-audit --no-fund next@15 react@19 react-dom@19
          npm i --no-audit --no-fund --no-save "../../${{ env.PKG_TGZ }}"

      - name: React 19 - build example
        working-directory: playwright/next-react19
        run: npm run build

      - name: React 19 - start example (background)
        working-directory: playwright/next-react19
        run: |
          nohup npm run start -- -p 3000 >/dev/null 2>&1 &
          echo $! > .server_pid

      - name: React 19 - run Playwright tests (app home)
        working-directory: playwright
        env:
          BASE_URL: http://localhost:3000
          CI: "1"
        run: npx playwright test

      - name: React 19 - check WC registration
        run: |
          curl -sSf http://localhost:3000/wc >/dev/null
          echo "OK: /wc served"

      - name: React 19 - stop example
        if: always()
        working-directory: playwright/next-react19
        run: |
          kill $(cat .server_pid) || true

      - name: React 18 - install deps
        working-directory: playwright/next-react18
        run: |
          npm i --no-audit --no-fund next@14.2.18 react@18.3.1 react-dom@18.3.1
          npm i --no-audit --no-fund --no-save "../../${{ env.PKG_TGZ }}"

      - name: React 18 - build example
        working-directory: playwright/next-react18
        run: npm run build

      - name: React 18 - start example (background)
        working-directory: playwright/next-react18
        run: |
          nohup npm run start -- -p 3001 >/dev/null 2>&1 &
          echo $! > .server_pid

      - name: React 18 - run Playwright tests (app home)
        working-directory: playwright
        env:
          BASE_URL: http://localhost:3001
          CI: "1"
        run: npx playwright test

      - name: React 18 - check WC registration
        run: |
          curl -sSf http://localhost:3001/wc >/dev/null
          echo "OK: /wc served"

      - name: React 18 - stop example
        if: always()
        working-directory: playwright/next-react18
        run: |
          kill $(cat .server_pid) || true

      - name: Serve plain HTML example (background)
        working-directory: playwright/html
        run: |
          python3 -m http.server 3002 >/dev/null 2>&1 & echo $! > .server_pid

      - name: Check plain HTML WC example
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3002 >/dev/null; then break; fi
            sleep 1
          done
          curl -sSf http://localhost:3002 | grep -q "Clover WC Plain HTML"
          echo "OK: plain HTML WC example served"

      - name: Stop plain HTML example
        if: always()
        working-directory: playwright/html
        run: |
          kill $(cat .server_pid) || true
