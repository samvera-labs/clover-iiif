name: e2e

on:
  push:
    branches: [ fix/react-bundling-and-exports ]
  pull_request:
    branches: [ main ]

jobs:
  react18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root deps
        run: npm ci
      - name: Build library
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Install example deps
        working-directory: examples/next-react18
        run: npm ci
      - name: Build example
        working-directory: examples/next-react18
        run: npm run build
      - name: Run e2e tests (Next 14 + React 18)
        env:
          BASE_URL: http://localhost:3001
          WEB_SERVER_CMD: npm --prefix examples/next-react18 run start -- -p 3001
          CI: '1'
        run: npx playwright test

  react19:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root deps
        run: npm ci
      - name: Build library
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Install example deps
        working-directory: examples/next-react19
        run: npm ci
      - name: Build example
        working-directory: examples/next-react19
        run: npm run build
      - name: Run e2e tests (Next 15 + React 19)
        env:
          BASE_URL: http://localhost:3002
          WEB_SERVER_CMD: npm --prefix examples/next-react19 run start -- -p 3002
          CI: '1'
        run: npx playwright test

